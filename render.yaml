services:
  - type: web
    name: pdf-tools-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: 5000
      - key: MAX_FILE_SIZE_MB
        value: 100
      - key: FILE_EXPIRY_MINUTES
        value: 60

  - type: web
    name: pdf-tools-frontend
    runtime: node
    rootDir: nextjs
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://pdf-tools-bzm0.onrender.com/api
      - key: PORT
        value: 3000
